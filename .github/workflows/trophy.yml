name: 🏆 Generate Trophies

on:
  schedule:
    - cron: "30 0 * * *"       # daily at 00:30 UTC, offset from the snake job
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - ".github/workflows/trophy.yml"

permissions:
  contents: write

jobs:
  generate-trophy:
    runs-on: ubuntu-latest
    steps:
      - name: Create output directory
        run: mkdir -p dist   # the trophy action doesn't create this itself, so pre-create it

      - name: Generate trophy SVG (self-hosted, no third-party service)
        uses: Erik-Donath/github-profile-trophy@feature/generate-svg
        with:
          username: Naeem-Shuvo
          output_path: dist/trophy.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify trophy.svg was generated
        run: |
          # Action currently writes to ./trophy.svg; move it into dist for publish step.
          if [ ! -s dist/trophy.svg ] && [ -s trophy.svg ]; then
            mv trophy.svg dist/trophy.svg
          fi
          if [ ! -s dist/trophy.svg ]; then
            echo "::error::dist/trophy.svg was not created by the trophy action. Check the 'Generate trophy SVG' step's logs above for the real failure (bad token scope, API error, etc.)."
            exit 1
          fi
          echo "trophy.svg generated successfully:"
          ls -la dist/

      - name: Push trophy to its own output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output-trophy   # separate from the snake's "output" branch
          build_dir: dist                # so the two workflows never overwrite each other
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
